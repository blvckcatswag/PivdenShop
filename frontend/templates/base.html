<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PivdenShop{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    {% include "header.html" %}

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 PivdenShop. Усі права захищені.</p>
        </div>
    </footer>

    <div class="modal-overlay" id="product-modal" onclick="if(event.target===this)closeModal()">
        <div class="modal modal-product">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-top">
                <div class="modal-image">
                    <div class="modal-image-placeholder"></div>
                </div>
                <div class="modal-info">
                    <h2 id="modal-title"></h2>
                    <div class="modal-price" id="modal-price"></div>
                    <div class="modal-category" id="modal-category"></div>
                    <p class="modal-description" id="modal-description"></p>

                    <div class="seller-info">
                        <div class="seller-avatar" id="modal-seller-avatar">S</div>
                        <div class="seller-details">
                            <div class="seller-name" id="modal-seller-name"></div>
                            <div class="seller-meta">
                                <span id="modal-seller-rating"></span>
                                <span id="modal-seller-sales"></span>
                            </div>
                            <div class="seller-since" id="modal-seller-since"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-reviews-section">
                <h3 id="modal-reviews-title">Відгуки</h3>
                <div id="modal-reviews"></div>
            </div>

            <div class="modal-review-form">
                <h4>Ваш відгук</h4>
                <div class="review-form-body" id="review-form-body">
                    <div class="star-rating" id="star-rating">
                        <span data-rating="1">&#9733;</span>
                        <span data-rating="2">&#9733;</span>
                        <span data-rating="3">&#9733;</span>
                        <span data-rating="4">&#9733;</span>
                        <span data-rating="5" class="active">&#9733;</span>
                    </div>
                    <textarea id="review-text" placeholder="Напишіть відгук..." rows="3"></textarea>
                    <button class="btn btn-gradient btn-sm" id="submit-review">Надіслати відгук</button>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-outline" onclick="alert('Чат буде доступний пізніше')">Написати продавцю</button>
                <button class="btn btn-gradient" id="modal-add-cart">Додати в кошик</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
    (function() {
        var token = localStorage.getItem('token');
        if (!token) return;
        function updateNotifCount() {
            fetch('/api/notifications/count', {
                headers: {'Authorization': 'Bearer ' + token}
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var badge = document.getElementById('notif-badge');
                if (badge && data.count !== undefined) {
                    badge.textContent = data.count;
                    badge.style.display = data.count > 0 ? 'inline-block' : 'none';
                }
            })
            .catch(function() {});
        }
        updateNotifCount();
        setInterval(updateNotifCount, 30000);
    })();
    </script>
</body>
</html>
