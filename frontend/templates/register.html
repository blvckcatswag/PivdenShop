{% extends "base.html" %}

{% block title %}Реєстрація — PivdenShop{% endblock %}

{% block content %}
<section class="section">
    <div class="auth-lamp-layout">
        <div class="auth-lamp-left">
            <div class="lamp-scene">
                <div class="lamp" id="lamp" onclick="toggleLamp()">
                    <div class="lamp-cord">
                        <div class="lamp-switch"></div>
                    </div>
                    <div class="lamp-shade"></div>
                    <div class="lamp-pole"></div>
                    <div class="lamp-base"></div>
                    <div class="lamp-glow"></div>
                </div>
                <p class="lamp-hint" id="lamp-hint">Натисни на лампу</p>
            </div>
        </div>
        <div class="auth-lamp-right">
            <div class="auth-card">
                <a href="/" class="auth-close" title="Закрити">&times;</a>
                <h1 class="auth-title">Реєстрація</h1>
                <form id="register-form" class="auth-form" novalidate>
                    <div class="form-group">
                        <label for="full_name">Повне ім'я</label>
                        <input type="text" id="full_name" name="full_name" placeholder="Ім'я Прізвище">
                        <span class="field-error" id="name-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                        <span class="field-error" id="email-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="phone">Телефон</label>
                        <input type="tel" id="phone" name="phone" placeholder="+380XXXXXXXXX" required>
                        <span class="field-error" id="phone-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" name="password" placeholder="Мінімум 6 символів" required>
                        <span class="field-error" id="password-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="password_confirm">Підтвердити пароль</label>
                        <input type="password" id="password_confirm" name="password_confirm" placeholder="Повторіть пароль" required>
                        <span class="field-error" id="confirm-error"></span>
                    </div>
                    <div class="form-message" id="form-message"></div>
                    <button type="submit" class="btn-gradient">Зареєструватися</button>
                </form>
                <p class="auth-link">Вже є акаунт? <a href="/login">Увійти</a></p>
            </div>
        </div>
    </div>
</section>

<script>
function toggleLamp() {
    var isOn = document.body.classList.toggle('lamp-on');
    document.body.classList.toggle('lamp-off', !isOn);
    localStorage.setItem('lamp', isOn ? '1' : '0');
    document.getElementById('lamp-hint').textContent = isOn ? 'Вимкнути світло' : 'Увімкнути світло';
}

(function() {
    var saved = localStorage.getItem('lamp');
    if (saved === '1') {
        document.body.classList.add('lamp-on');
        document.getElementById('lamp-hint').textContent = 'Вимкнути світло';
    } else {
        document.body.classList.add('lamp-off');
        document.getElementById('lamp-hint').textContent = 'Увімкнути світло';
    }
})();

document.getElementById('register-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    document.querySelectorAll('.field-error').forEach(el => el.textContent = '');
    document.getElementById('form-message').textContent = '';

    const full_name = document.getElementById('full_name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('password_confirm').value;

    let valid = true;

    if (!email || !email.includes('@')) {
        document.getElementById('email-error').textContent = 'Введіть коректний email';
        valid = false;
    }
    if (!phone) {
        document.getElementById('phone-error').textContent = 'Введіть номер телефону';
        valid = false;
    }
    if (password.length < 6) {
        document.getElementById('password-error').textContent = 'Мінімум 6 символів';
        valid = false;
    }
    if (password !== confirm) {
        document.getElementById('confirm-error').textContent = 'Паролі не співпадають';
        valid = false;
    }

    if (!valid) return;

    try {
        const resp = await fetch('/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, phone, password, full_name})
        });
        const data = await resp.json();
        if (resp.ok) {
            localStorage.setItem('token', data.token);
            document.cookie = 'token=' + data.token + '; path=/';
            window.location.href = '/';
        } else {
            document.getElementById('form-message').textContent = data.error || 'Помилка реєстрації';
        }
    } catch (err) {
        document.getElementById('form-message').textContent = 'Помилка з\'єднання з сервером';
    }
});
</script>
{% endblock %}
