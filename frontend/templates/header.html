<header class="header">
    <div class="container">
        <div class="header-top">
            <a href="/" class="logo">PivdenShop</a>

            <form class="search-form" action="/search" method="GET">
                <span class="search-icon">&#128269;</span>
                <input type="text" name="q" placeholder="Пошук по сайту..." autocomplete="off">
            </form>

            <div class="header-actions">
                <a href="/notifications" class="icon-btn" title="Сповіщення" id="notif-btn">
                    &#128276;
                    <span class="badge" id="notif-badge">0</span>
                </a>
                <a href="/cart" class="icon-btn" title="Кошик">
                    &#128722;
                    <span class="badge" id="cart-badge">0</span>
                </a>

                <div class="user-menu">
                    <button class="user-menu-toggle">
                        <span class="avatar" id="header-avatar">?</span>
                        <span class="user-name" id="header-username">Гість</span>
                        <span>&#9662;</span>
                    </button>
                    <div class="user-dropdown" id="header-dropdown">
                        <a href="/login">Увійти</a>
                        <a href="/register">Реєстрація</a>
                    </div>
                </div>
                <script>
                (function() {
                    var t = localStorage.getItem('token');
                    if (!t) return;
                    try {
                        var p = JSON.parse(atob(t.split('.')[1]));
                        if (p.exp * 1000 < Date.now()) return;
                        var dd = document.getElementById('header-dropdown');
                        dd.innerHTML = '<a href="/profile">Мій кабінет</a><a href="/orders">Замовлення</a><a href="#" id="logout-link">Вийти</a>';
                        document.getElementById('logout-link').addEventListener('click', function(e) {
                            e.preventDefault();
                            localStorage.removeItem('token');
                            document.cookie = 'token=; path=/; max-age=0';
                            window.location.href = '/';
                        });
                        fetch('/api/profile', {
                            headers: {'Accept': 'application/json', 'Authorization': 'Bearer ' + t}
                        }).then(function(r) { return r.json(); }).then(function(u) {
                            var name = u.full_name || u.email || '';
                            if (name) {
                                document.getElementById('header-username').textContent = name;
                                document.getElementById('header-avatar').textContent = name[0].toUpperCase();
                            }
                        }).catch(function() {});
                    } catch(e) {}
                })();
                </script>
            </div>
        </div>

        <nav class="nav">
            <a href="/">Головна</a>
            <div class="nav-dropdown">
                <a href="/products" class="nav-dropdown-toggle">Категорії &#9662;</a>
                <div class="mega-menu">
                    <a href="/products?category=Електроніка">&#128187; Електроніка</a>
                    <a href="/products?category=Одяг">&#128085; Одяг</a>
                    <a href="/products?category=Дім">&#127968; Дім</a>
                    <a href="/products?category=Спорт">&#9917; Спорт</a>
                    <a href="/products?category=Краса">&#128132; Краса</a>
                </div>
            </div>
            <a href="/about">Про нас</a>
        </nav>
    </div>
</header>
